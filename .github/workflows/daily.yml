name: Daily Activity
on:
  schedule:
    - cron: '30 6 * * *'
    - cron: '30 13 * * *'
    - cron: '30 20 * * *'
  workflow_dispatch:
jobs:
  auto-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Random delay
        run: sleep $((RANDOM % 7200 + 900))
      - name: Make commit
        run: |
          if grep -q "last-synced" SKILL.md 2>/dev/null; then
            sed -i "s/last-synced: .*/last-synced: $(date -u '+%Y-%m-%d %H:%M UTC')/" SKILL.md
          else
            echo "" >> SKILL.md
            echo "---" >> SKILL.md
            echo "last-synced: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> SKILL.md
          fi
          echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC') — auto sync" >> .activity.log
          git config user.name "dev-bot"
          git config user.email "dev-bot@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: sync $(date -u '+%Y-%m-%d')"
          git push
